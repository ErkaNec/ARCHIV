<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="icon.ico">
  <title>ARCHIV</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #111;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    h1 {
      font-size: 5rem;
      margin-bottom: 40px;
      letter-spacing: 8px;
    }

    button {
      padding: 16px 48px;
      font-size: 1.4rem;
      border: none;
      cursor: pointer;
      background: white;
      color: black;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<h1>ARCHIV</h1>

<button onclick="startGame()">START</button>

<script>
  function startGame() {
    localStorage.setItem("audioEnabled", "true");
    window.location.href = "https://erkanec.github.io/ARCHIV/mesto/";
  }
</script>

</body>
</html>
